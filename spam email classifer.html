<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spam Email Classifier</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
width:500px;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
text-align:center;
}

h1{
color:#333;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:20px;
}

textarea{
width:100%;
height:180px;
padding:15px;
font-size:16px;
border:2px solid #ddd;
border-radius:10px;
resize:none;
outline:none;
transition:.3s;
}

textarea:focus{
border-color:#4facfe;
}

button{
margin-top:20px;
padding:12px 35px;
border:none;
border-radius:30px;
font-size:17px;
background:#4facfe;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0d8bff;
}

.result{
margin-top:25px;
font-size:22px;
font-weight:bold;
}

.spam{
color:red;
}

.ham{
color:green;
}

</style>

</head>
<body>

<div class="container">

<h1>📧 Spam Email Classifier</h1>

<p>Enter your email message below.</p>

<form action="/predict" method="POST">

<textarea
name="email"
placeholder="Type or paste your email here..."
required></textarea>

<button type="submit">
Predict
</button>

</form>

<!-- Flask Result -->

<!--
{% if prediction %}
<div class="result">

{% if prediction == "Spam" %}
<span class="spam">🚫 Spam Email</span>
{% else %}
<span class="ham">✅ Not Spam</span>
{% endif %}

</div>
{% endif %}
-->

</div>

</body>
</html>
